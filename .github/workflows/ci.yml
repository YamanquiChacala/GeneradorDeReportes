name: Continuous Integration

on:
  push:
    branches: [ "main" ] # Runs when you push to main
  pull_request:
    branches: [ "main" ] # Runs when you open a PR to main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Grabs your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Sets up Node.js (Using v20, adjust if you use a different LTS version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installs your devDependencies from package.json
      - name: Install Dependencies
        run: npm ci # 'npm ci' is strictly for CI environments, it uses package-lock.json

      # 4. Runs your existing test and coverage script
      - name: Run Tests and Generate Coverage
        run: npm run test:coverage

      # 5. Uploads the lcov file to Codecov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info